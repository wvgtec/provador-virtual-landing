<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mirage — Painel do Cliente</title>
  <link rel="icon" type="image/png" href="logo-mirage.png">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --purple: #6C5CE7; --purple-dark: #5649c0; --purple-light: #f0eeff;
      --text: #1a1a2e; --muted: #64748b; --border: #e2e8f0;
      --green: #00b894; --red: #e17055; --bg: #f8faff;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); }

    /* LOGIN */
    .login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .login-box {
      background: #fff; border-radius: 20px; padding: 44px 40px;
      width: 100%; max-width: 380px; box-shadow: 0 8px 48px rgba(0,0,0,.10); text-align: center;
    }
    .login-box img { height: 56px; margin-bottom: 16px; }
    .login-box h1 { font-size: 20px; font-weight: 800; color: var(--purple); margin-bottom: 6px; }
    .login-box p { font-size: 14px; color: var(--muted); margin-bottom: 24px; }
    .login-box input {
      width: 100%; padding: 13px 15px; border: 1.5px solid var(--border);
      border-radius: 10px; font-size: 14px; margin-bottom: 12px; outline: none;
      font-family: inherit; transition: border-color .2s;
    }
    .login-box input:focus { border-color: var(--purple); }
    .login-btn {
      width: 100%; background: var(--purple); color: #fff; border: none;
      padding: 14px; border-radius: 10px; font-size: 15px; font-weight: 700;
      cursor: pointer; transition: background .2s; font-family: inherit;
    }
    .login-btn:hover { background: var(--purple-dark); }
    .login-btn:disabled { background: #c0b8f0; cursor: not-allowed; }
    .login-error { color: var(--red); font-size: 13px; margin-top: 12px; min-height: 18px; }
    .key-preview { font-family: monospace; font-size: 12px; color: var(--muted); background: var(--bg); padding: 8px 12px; border-radius: 8px; margin-bottom: 16px; word-break: break-all; }

    /* APP */
    .app { display: none; min-height: 100vh; flex-direction: column; }
    .app.visible { display: flex; }

    /* TOP BAR */
    .topbar {
      background: #fff; border-bottom: 1px solid var(--border);
      padding: 0 28px; height: 64px; display: flex; align-items: center;
      justify-content: space-between; position: sticky; top: 0; z-index: 50;
    }
    .topbar-logo { display: flex; align-items: center; gap: 10px; }
    .topbar-logo img { height: 36px; }
    .topbar-logo span { font-size: 14px; font-weight: 600; color: var(--muted); }
    .topbar-right { display: flex; align-items: center; gap: 16px; }
    .client-key-badge { font-family: monospace; font-size: 11px; background: var(--purple-light); color: var(--purple); padding: 5px 10px; border-radius: 6px; }
    .logout-btn { background: none; border: none; cursor: pointer; font-size: 13px; color: var(--muted); font-family: inherit; }
    .logout-btn:hover { color: var(--text); }

    /* TABS */
    .tabs { display: flex; gap: 0; border-bottom: 2px solid var(--border); padding: 0 28px; background: #fff; }
    .tab {
      padding: 14px 22px; font-size: 14px; font-weight: 600; cursor: pointer;
      color: var(--muted); border-bottom: 2px solid transparent; margin-bottom: -2px;
      transition: all .2s;
    }
    .tab:hover { color: var(--purple); }
    .tab.active { color: var(--purple); border-bottom-color: var(--purple); }

    /* MAIN */
    .main { padding: 28px; flex: 1; max-width: 1200px; width: 100%; margin: 0 auto; }

    /* VIEWS */
    .view { display: none; }
    .view.active { display: block; }

    /* STATS */
    .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 16px; margin-bottom: 28px; }
    .stat-card { background: #fff; border-radius: 14px; padding: 22px; border: 1px solid var(--border); }
    .stat-card .icon { font-size: 28px; margin-bottom: 10px; }
    .stat-card .num { font-size: 36px; font-weight: 900; color: var(--purple); letter-spacing: -1.5px; }
    .stat-card .lbl { font-size: 13px; color: var(--muted); margin-top: 4px; font-weight: 500; }

    /* CARDS */
    .card { background: #fff; border-radius: 14px; border: 1px solid var(--border); overflow: hidden; margin-bottom: 24px; }
    .card-head { padding: 18px 22px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .card-head h3 { font-size: 15px; font-weight: 700; }
    .card-body { padding: 22px; }

    /* CHART */
    .chart-wrap { position: relative; height: 260px; }

    /* TABLE */
    table { width: 100%; border-collapse: collapse; }
    thead { background: #fafafa; }
    th { padding: 11px 16px; text-align: left; font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; border-bottom: 1px solid var(--border); }
    td { padding: 13px 16px; font-size: 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fafbff; }

    /* BUTTONS */
    .btn { padding: 9px 18px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; font-family: inherit; transition: all .2s; }
    .btn-primary { background: var(--purple); color: #fff; }
    .btn-primary:hover { background: var(--purple-dark); }
    .btn-ghost { background: transparent; border: 1.5px solid var(--border); color: var(--muted); }
    .btn-ghost:hover { border-color: var(--purple); color: var(--purple); }

    /* SEARCH */
    .search-bar { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    .search-input { padding: 9px 14px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 14px; outline: none; font-family: inherit; min-width: 220px; }
    .search-input:focus { border-color: var(--purple); }

    /* EMPTY */
    .empty { text-align: center; padding: 56px 20px; color: var(--muted); }
    .empty .icon { font-size: 44px; margin-bottom: 12px; }
    .empty p { font-size: 15px; }

    /* LOADING */
    .loading { text-align: center; padding: 40px; color: var(--muted); font-size: 14px; }

    /* TOP PRODUCTS */
    .product-row { display: flex; align-items: center; gap: 14px; padding: 10px 0; border-bottom: 1px solid var(--border); }
    .product-row:last-child { border-bottom: none; }
    .product-img { width: 48px; height: 48px; border-radius: 8px; object-fit: cover; border: 1px solid var(--border); flex-shrink: 0; background: var(--purple-light); }
    .product-url { font-size: 12px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 300px; }
    .product-count { font-weight: 800; font-size: 20px; color: var(--purple); margin-left: auto; flex-shrink: 0; }
    .bar-wrap { flex: 1; height: 6px; background: var(--purple-light); border-radius: 999px; overflow: hidden; }
    .bar-fill { height: 100%; background: var(--purple); border-radius: 999px; transition: width .8s ease; }

    /* RESULT THUMB */
    .result-thumb { width: 40px; height: 40px; border-radius: 6px; object-fit: cover; border: 1px solid var(--border); cursor: pointer; }

    .toast {
      position: fixed; bottom: 24px; right: 24px;
      background: var(--text); color: #fff; padding: 12px 20px;
      border-radius: 10px; font-size: 14px; font-weight: 500;
      opacity: 0; transition: opacity .3s; z-index: 999; pointer-events: none;
    }
    .toast.show { opacity: 1; }

    @media (max-width: 640px) {
      .topbar { padding: 0 16px; }
      .main { padding: 16px; }
      .tabs { padding: 0 16px; overflow-x: auto; }
      .tab { white-space: nowrap; }
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="login-screen">
  <div class="login-box">
    <img src="logo-mirage.png" alt="Mirage">
    <h1>Meu Painel</h1>
    <p id="login-desc">Entre com a senha enviada pela equipe Mirage</p>
    <div class="key-preview" id="key-preview"></div>
    <input type="password" id="login-pass" placeholder="Sua senha de acesso" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" id="login-btn" onclick="doLogin()">Entrar</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- APP -->
<div class="app" id="app">
  <div class="topbar">
    <div class="topbar-logo">
      <img src="logo-mirage.png" alt="Mirage">
      <span id="topbar-name">Painel do cliente</span>
    </div>
    <div class="topbar-right">
      <span class="client-key-badge" id="topbar-key"></span>
      <button class="logout-btn" onclick="doLogout()">Sair</button>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="showView('dashboard', this)">📊 Dashboard</div>
    <div class="tab" onclick="showView('leads', this)">👤 Emails / Leads</div>
  </div>

  <div class="main">

    <!-- DASHBOARD -->
    <div class="view active" id="view-dashboard">
      <div class="stats-row">
        <div class="stat-card"><div class="icon">👗</div><div class="num" id="ds-jobs">-</div><div class="lbl">Tryons realizados</div></div>
        <div class="stat-card"><div class="icon">👤</div><div class="num" id="ds-leads">-</div><div class="lbl">Leads capturados</div></div>
        <div class="stat-card"><div class="icon">📈</div><div class="num" id="ds-conv">-</div><div class="lbl">Taxa de lead</div></div>
      </div>

      <div class="card">
        <div class="card-head">
          <h3>Tryons por dia (últimos 30 dias)</h3>
          <button class="btn btn-ghost" onclick="loadDashboard()">Atualizar</button>
        </div>
        <div class="card-body">
          <div class="chart-wrap">
            <canvas id="chart-tryons"></canvas>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-head"><h3>Produtos mais experimentados</h3></div>
        <div class="card-body" id="top-products">
          <div class="loading">Carregando...</div>
        </div>
      </div>
    </div>

    <!-- LEADS -->
    <div class="view" id="view-leads">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:12px">
        <div class="search-bar">
          <input type="text" class="search-input" id="lead-search" placeholder="Buscar nome ou e-mail..." oninput="filterLeads()">
          <button class="btn btn-ghost" onclick="loadLeads()">Atualizar</button>
        </div>
        <button class="btn btn-primary" onclick="exportCSV()">⬇ Exportar CSV</button>
      </div>

      <div class="card">
        <table>
          <thead>
            <tr>
              <th>Produto</th>
              <th>Nome</th>
              <th>E-mail</th>
              <th>WhatsApp</th>
              <th>Data</th>
              <th>Resultado</th>
            </tr>
          </thead>
          <tbody id="leads-body"></tbody>
        </table>
      </div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ── Configuração ────────────────────────────────────────────────────────────
  const SEC_KEY = 'mcl_secret';
  const URL_KEY = 'mcl_api_url';

  const params   = new URLSearchParams(location.search);
  const clientKey = params.get('key') || '';

  let apiUrl     = params.get('api') || localStorage.getItem(URL_KEY) || 'https://provador-virtual-brown.vercel.app';
  let secret     = localStorage.getItem(SEC_KEY + '_' + clientKey) || '';
  let allLeads   = [];
  let tryonChart = null;

  // ── Inicialização ───────────────────────────────────────────────────────────
  window.addEventListener('DOMContentLoaded', () => {
    if (!clientKey) {
      document.getElementById('login-desc').textContent = 'Chave de acesso não encontrada na URL.';
      document.getElementById('login-btn').disabled = true;
      return;
    }
    document.getElementById('key-preview').textContent = clientKey;

    if (secret) {
      doLogin(true);
    }
  });

  // ── Login ───────────────────────────────────────────────────────────────────
  async function doLogin(isAuto = false) {
    const passInput = document.getElementById('login-pass');
    const pass = passInput?.value?.trim() || secret;

    if (!pass) { showLoginError('Informe sua senha de acesso.'); return; }

    const btn = document.getElementById('login-btn');
    btn.disabled = true;
    btn.textContent = 'Verificando...';
    document.getElementById('login-error').textContent = '';

    try {
      const res = await fetch(`${apiUrl}/api/leads?key=${encodeURIComponent(clientKey)}&action=analytics`, {
        headers: { 'X-Client-Secret': pass },
      });

      if (res.status === 401 || res.status === 403) {
        localStorage.removeItem(SEC_KEY + '_' + clientKey);
        secret = '';
        btn.disabled = false;
        btn.textContent = 'Entrar';
        if (!isAuto) showLoginError('Senha incorreta. Tente novamente.');
        return;
      }
      if (!res.ok) {
        btn.disabled = false;
        btn.textContent = 'Entrar';
        if (!isAuto) showLoginError('Erro ' + res.status + '. Tente novamente.');
        return;
      }

      secret = pass;
      localStorage.setItem(SEC_KEY + '_' + clientKey, pass);
      localStorage.setItem(URL_KEY, apiUrl);

      btn.disabled = false;
      btn.textContent = 'Entrar';
      openApp();

    } catch (e) {
      btn.disabled = false;
      btn.textContent = 'Entrar';
      if (!isAuto) showLoginError('Não foi possível conectar: ' + e.message);
    }
  }

  function showLoginError(msg) {
    document.getElementById('login-error').textContent = msg;
  }

  function openApp() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').classList.add('visible');
    document.getElementById('topbar-key').textContent = clientKey.slice(0, 12) + '...';
    loadDashboard();
  }

  function doLogout() {
    localStorage.removeItem(SEC_KEY + '_' + clientKey);
    location.reload();
  }

  // ── Views ───────────────────────────────────────────────────────────────────
  function showView(name, el) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById('view-' + name).classList.add('active');
    if (el) el.classList.add('active');
    if (name === 'leads') loadLeads();
  }

  // ── Dashboard ───────────────────────────────────────────────────────────────
  async function loadDashboard() {
    document.getElementById('ds-jobs').textContent  = '...';
    document.getElementById('ds-leads').textContent = '...';
    document.getElementById('ds-conv').textContent  = '...';
    document.getElementById('top-products').innerHTML = '<div class="loading">Carregando...</div>';

    try {
      const [analyticsRes, leadsRes] = await Promise.all([
        fetch(`${apiUrl}/api/leads?key=${encodeURIComponent(clientKey)}&action=analytics`, { headers: { 'X-Client-Secret': secret } }),
        fetch(`${apiUrl}/api/leads?key=${encodeURIComponent(clientKey)}&action=leads&limit=200`, { headers: { 'X-Client-Secret': secret } }),
      ]);

      const analytics = await analyticsRes.json();
      const leadsData = await leadsRes.json();
      allLeads = leadsData.leads || [];

      // Stats
      const totalJobs  = analytics.totalJobs  || 0;
      const totalLeads = analytics.totalLeads || 0;
      const conv = totalJobs > 0 ? Math.round((totalLeads / totalJobs) * 100) : 0;
      document.getElementById('ds-jobs').textContent  = totalJobs;
      document.getElementById('ds-leads').textContent = totalLeads;
      document.getElementById('ds-conv').textContent  = conv + '%';

      // Gráfico de tryons por dia
      renderTryonsChart(allLeads);

      // Top produtos
      renderTopProducts(analytics.topProducts || []);

    } catch (e) {
      document.getElementById('top-products').innerHTML = `<div class="empty"><div class="icon">⚠️</div><p>Erro: ${escHtml(e.message)}</p></div>`;
    }
  }

  function renderTryonsChart(leads) {
    // Agrupa por dia (últimos 30 dias)
    const today = new Date();
    const days  = {};
    for (let i = 29; i >= 0; i--) {
      const d = new Date(today);
      d.setDate(d.getDate() - i);
      const key = d.toISOString().slice(0, 10);
      days[key] = 0;
    }
    leads.forEach(l => {
      if (!l.completedAt) return;
      const key = new Date(l.completedAt).toISOString().slice(0, 10);
      if (key in days) days[key]++;
    });

    const labels = Object.keys(days).map(d => {
      const [, m, dd] = d.split('-');
      return `${dd}/${m}`;
    });
    const values = Object.values(days);

    const canvas = document.getElementById('chart-tryons');
    if (tryonChart) tryonChart.destroy();
    tryonChart = new Chart(canvas, {
      type: 'bar',
      data: {
        labels,
        datasets: [{
          label: 'Tryons',
          data: values,
          backgroundColor: 'rgba(108, 92, 231, 0.18)',
          borderColor: '#6C5CE7',
          borderWidth: 2,
          borderRadius: 6,
          borderSkipped: false,
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              title: (items) => 'Dia ' + items[0].label,
              label: (item)  => item.raw + ' tryon' + (item.raw !== 1 ? 's' : ''),
            }
          }
        },
        scales: {
          x: { grid: { display: false }, ticks: { maxTicksLimit: 10, font: { size: 11 } } },
          y: { beginAtZero: true, ticks: { stepSize: 1, font: { size: 11 } }, grid: { color: '#f0f0f0' } },
        }
      }
    });
  }

  function renderTopProducts(products) {
    const container = document.getElementById('top-products');
    if (!products.length) {
      container.innerHTML = '<div class="empty"><div class="icon">👗</div><p>Nenhum produto experimentado ainda.</p></div>';
      return;
    }
    const max = products[0]?.count || 1;
    container.innerHTML = products.map(p => {
      const domain = (() => { try { return new URL(p.url).hostname.replace('www.', ''); } catch { return p.url || 'produto'; }})();
      const pct = Math.round((p.count / max) * 100);
      return `
        <div class="product-row">
          <img src="${escHtml(p.url)}" class="product-img" alt="" onerror="this.style.display='none'">
          <div style="flex:1;min-width:0">
            <div style="font-size:13px;font-weight:600;margin-bottom:4px">${escHtml(domain)}</div>
            <div class="product-url">${escHtml(p.url)}</div>
            <div class="bar-wrap" style="margin-top:8px">
              <div class="bar-fill" style="width:${pct}%"></div>
            </div>
          </div>
          <div class="product-count">${p.count}</div>
        </div>`;
    }).join('');
  }

  // ── Leads ────────────────────────────────────────────────────────────────────
  async function loadLeads() {
    document.getElementById('leads-body').innerHTML = '<tr><td colspan="6"><div class="loading">Carregando...</div></td></tr>';
    allLeads = [];
    try {
      const res  = await fetch(`${apiUrl}/api/leads?key=${encodeURIComponent(clientKey)}&action=leads&limit=200`, { headers: { 'X-Client-Secret': secret } });
      const data = await res.json();
      allLeads = data.leads || [];
      renderLeads(allLeads);
    } catch (e) {
      document.getElementById('leads-body').innerHTML = `<tr><td colspan="6"><div class="empty"><div class="icon">⚠️</div><p>Erro: ${escHtml(e.message)}</p></div></td></tr>`;
    }
  }

  function renderLeads(leads) {
    const tbody = document.getElementById('leads-body');
    if (!leads.length) {
      tbody.innerHTML = '<tr><td colspan="6"><div class="empty"><div class="icon">📭</div><p>Nenhum lead capturado ainda.</p></div></td></tr>';
      return;
    }
    tbody.innerHTML = leads.map(l => {
      const date  = l.completedAt ? new Date(l.completedAt).toLocaleDateString('pt-BR') : '-';
      const pdomain = (() => { try { return new URL(l.productUrl).hostname.replace('www.',''); } catch { return l.productUrl || '-'; }})();
      return `<tr>
        <td>
          <div style="display:flex;align-items:center;gap:8px">
            ${l.productUrl ? `<img src="${escHtml(l.productUrl)}" class="result-thumb" title="${escHtml(l.productUrl)}" onerror="this.style.display='none'">` : ''}
            <span style="font-size:12px;color:var(--muted);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(pdomain)}</span>
          </div>
        </td>
        <td style="font-weight:600">${escHtml(l.name || '-')}</td>
        <td>${escHtml(l.email || '-')}</td>
        <td>${escHtml(l.whatsapp || '-')}</td>
        <td>${date}</td>
        <td>${l.resultUrl ? `<a href="${escHtml(l.resultUrl)}" target="_blank" style="color:var(--purple);font-size:12px;font-weight:600">Ver foto</a>` : '-'}</td>
      </tr>`;
    }).join('');
  }

  function filterLeads() {
    const q = document.getElementById('lead-search').value.toLowerCase();
    if (!q) { renderLeads(allLeads); return; }
    renderLeads(allLeads.filter(l =>
      (l.name  || '').toLowerCase().includes(q) ||
      (l.email || '').toLowerCase().includes(q) ||
      (l.whatsapp || '').includes(q)
    ));
  }

  // ── CSV Export ───────────────────────────────────────────────────────────────
  function exportCSV() {
    if (!allLeads.length) { toast('Nenhum lead para exportar.'); return; }
    const header = ['Nome', 'E-mail', 'WhatsApp', 'Produto', 'Data', 'URL Resultado'];
    const rows = allLeads.map(l => [
      l.name     || '',
      l.email    || '',
      l.whatsapp || '',
      l.productUrl  || '',
      l.completedAt ? new Date(l.completedAt).toLocaleDateString('pt-BR') : '',
      l.resultUrl   || '',
    ]);
    const csv = [header, ...rows]
      .map(r => r.map(v => '"' + String(v).replace(/"/g, '""') + '"').join(','))
      .join('\n');
    const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'leads_mirage_' + new Date().toISOString().slice(0, 10) + '.csv';
    a.click();
    toast('CSV exportado!');
  }

  // ── Helpers ──────────────────────────────────────────────────────────────────
  function escHtml(str) {
    return String(str || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2500);
  }
</script>
</body>
</html>
